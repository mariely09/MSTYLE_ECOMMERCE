<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/MStyle Logos/MStyle_logo1.png') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Notifications</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 3px; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <h1>🔔 Notifications System Test Page</h1>
    
    <div class="test-section">
        <h2>1. Check Session Data</h2>
        <button onclick="checkSession()">Check Current Session</button>
        <div id="sessionResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>2. Check Database Notifications</h2>
        <button onclick="checkDatabase()">View All Notifications in Database</button>
        <div id="databaseResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>3. Test API Endpoints</h2>
        <button onclick="testAPI()">Test Notifications API</button>
        <button onclick="testBypass()">Test Bypass API</button>
        <div id="apiResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>4. Create Test Notifications</h2>
        <button onclick="createTest()">Create Test Order Notification</button>
        <button onclick="createCancellationTest()">Create Test Cancellation Notification</button>
        <div id="createResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>5. Test with Specific Seller Email</h2>
        <input type="email" id="sellerEmail" placeholder="Enter seller email" style="padding: 8px; width: 300px;">
        <button onclick="testSpecificSeller()">Test for This Seller</button>
        <div id="specificResult" class="result"></div>
    </div>

    <script>
        function checkSession() {
            fetch('/debug-session')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('sessionResult').innerHTML = data;
                })
                .catch(error => {
                    document.getElementById('sessionResult').innerHTML = `<div class="error">Error: ${error.message}</div>`;
                });
        }

        function checkDatabase() {
            fetch('/debug-notifications')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('databaseResult').innerHTML = data;
                })
                .catch(error => {
                    document.getElementById('databaseResult').innerHTML = `<div class="error">Error: ${error.message}</div>`;
                });
        }

        function testAPI() {
            fetch('/api/seller/notifications')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('apiResult').innerHTML = `
                        <div class="${data.success ? 'success' : 'error'}">
                            <strong>API Response:</strong><br>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                })
                .catch(error => {
                    document.getElementById('apiResult').innerHTML = `<div class="error">Error: ${error.message}</div>`;
                });
        }

        function testBypass() {
            const email = prompt('Enter seller email to test:');
            if (email) {
                fetch(`/api/notifications-bypass/${email}`)
                    .then(response => response.json())
                    .then(data => {
                        document.getElementById('apiResult').innerHTML = `
                            <div class="${data.success ? 'success' : 'error'}">
                                <strong>Bypass API Response for ${email}:</strong><br>
                                <pre>${JSON.stringify(data, null, 2)}</pre>
                            </div>
                        `;
                    })
                    .catch(error => {
                        document.getElementById('apiResult').innerHTML = `<div class="error">Error: ${error.message}</div>`;
                    });
            }
        }

        function createTest() {
            fetch('/test-notifications')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('createResult').innerHTML = `<div class="success">${data}</div>`;
                })
                .catch(error => {
                    document.getElementById('createResult').innerHTML = `<div class="error">Error: ${error.message}</div>`;
                });
        }

        function createCancellationTest() {
            fetch('/test-cancellation-notification')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('createResult').innerHTML = `<div class="success">${data}</div>`;
                })
                .catch(error => {
                    document.getElementById('createResult').innerHTML = `<div class="error">Error: ${error.message}</div>`;
                });
        }

        function testSpecificSeller() {
            const email = document.getElementById('sellerEmail').value;
            if (!email) {
                alert('Please enter a seller email');
                return;
            }

            fetch(`/api/notifications-bypass/${email}`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('specificResult').innerHTML = `
                        <div class="${data.success ? 'success' : 'error'}">
                            <strong>Results for ${email}:</strong><br>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                })
                .catch(error => {
                    document.getElementById('specificResult').innerHTML = `<div class="error">Error: ${error.message}</div>`;
                });
        }
    </script>
</body>
</html>
