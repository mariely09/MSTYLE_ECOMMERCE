<!-- Success Message Wishlist Modal -->
<div id="successWishlistModal" class="success-wishlist-modal" aria-hidden="true" role="dialog">
    <div class="success-wishlist-modal-content">
        <div class="success-wishlist-icon" id="wishlistModalIcon">
            <i class="fas fa-heart success-wishlist-checkmark" id="wishlistModalIcon_i"></i>
        </div>
        <h2 id="successWishlistTitle">Added to Wishlist!</h2>
        <p class="thank-you-wishlist-message" id="successWishlistSubtitle">Success!</p>
        <p class="wishlist-message" id="successWishlistMessage">Item has been added to your wishlist.</p>
        <div class="success-wishlist-modal-buttons">
            <button type="button" class="view-wishlist-btn" onclick="goToWishlist()">
                <i class="fas fa-heart"></i>
                View Wishlist
            </button>
            <button type="button" class="continue-shopping-btn" onclick="closeSuccessWishlistModal()">
                <i class="fas fa-shopping-bag"></i>
                Continue Shopping
            </button>
        </div>
    </div>
</div>

<script>
function showSuccessWishlistModal(message, isRemove) {
    const modal    = document.getElementById('successWishlistModal');
    const icon     = document.getElementById('wishlistModalIcon');
    const iconEl   = document.getElementById('wishlistModalIcon_i');
    const title    = document.getElementById('successWishlistTitle');
    const subtitle = document.getElementById('successWishlistSubtitle');
    const msg      = document.getElementById('successWishlistMessage');

    if (isRemove) {
        title.textContent    = 'Removed from Wishlist';
        subtitle.textContent = 'Item removed!';
        msg.textContent      = message || 'Item has been removed from your wishlist.';
        icon.style.background = 'linear-gradient(135deg, #6c757d, #495057)';
        title.style.color     = '#6c757d';
    } else {
        title.textContent    = 'Added to Wishlist!';
        subtitle.textContent = 'Success!';
        msg.textContent      = message || 'Item has been added to your wishlist.';
        icon.style.background = 'linear-gradient(135deg, #e74c3c, #c0392b)';
        title.style.color     = '#e74c3c';
    }

    modal.classList.add('show');
    modal.setAttribute('aria-hidden', 'false');
    setTimeout(closeSuccessWishlistModal, 3000);
}

function closeSuccessWishlistModal() {
    const modal = document.getElementById('successWishlistModal');
    if (modal) {
        modal.classList.remove('show');
        modal.setAttribute('aria-hidden', 'true');
    }
}

function goToWishlist() {
    window.location.href = "{{ url_for('wishlist') }}";
}

window.addEventListener('click', function(e) {
    const modal = document.getElementById('successWishlistModal');
    if (e.target === modal) closeSuccessWishlistModal();
});
</script>
