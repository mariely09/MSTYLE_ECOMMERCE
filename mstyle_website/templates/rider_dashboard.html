<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/MStyle Logos/MStyle_logo1.png') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Rider Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/rider_dashboard.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
</head>

<body>
    {% include 'rider_header.html' %}
    <div class="container">
        <div class="content">
            <div class="dashboard-header">
                <div class="dashboard-avatar">
                    <i class="bi bi-speedometer2"></i>
                </div>
                <h1>Rider Dashboard</h1>
                <p>Track your deliveries and earnings</p>
            </div>

            <div class="dashboard-container">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon available">
                            <i class="bi bi-list-task"></i>
                        </div>
                        <div class="stat-value">{{ available_deliveries or 0 }}</div>
                        <div class="stat-label">Available Deliveries</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon active">
                            <i class="bi bi-truck"></i>
                        </div>
                        <div class="stat-value">{{ active_deliveries or 0 }}</div>
                        <div class="stat-label">Active Deliveries</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon earnings">
                            <i class="bi bi-currency-dollar"></i>
                        </div>
                        <div class="stat-value">₱{{ total_earnings or '0.00' }}</div>
                        <div class="stat-label">Total Earnings</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/logout.js') }}"></script>
</body>

</html>
